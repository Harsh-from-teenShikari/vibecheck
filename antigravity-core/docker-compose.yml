version: '3.8'

services:
  # Next.js Frontend App
  web:
    build:
      context: ../antigravity-frontend
      dockerfile: Dockerfile
    container_name: antigravity_web
    ports:
      - '3000:3000'
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M

  # Nest.js Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antigravity_api
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 512M

  # PostgreSQL (Primary Transactional DB)
  postgres:
    image: postgres:15-alpine
    container_name: antigravity_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: antigravity_core
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d antigravity_core" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Cache, Rate Limiting, Idempotency)
  redis:
    image: redis:7-alpine
    container_name: antigravity_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
